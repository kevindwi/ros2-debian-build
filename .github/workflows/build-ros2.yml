name: Build ROS 2 for Debian

on:
  workflow_dispatch:

jobs:
  build-ros2:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Prerequisite Tools
        run: |
          apt update && apt install -y curl gnupg2 lsb-release wget sudo git python3-pip gawk

      - name: Setup Locale
        run: |
          apt install -y locales
          sed -i '/en_US.UTF-8 UTF-8/s/^# //' /etc/locale.gen
          locale-gen
          update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8

      - name: Enable Required ROS 2 Repositories
        run: |
          apt update && apt install curl -y
          # Mengunduh konfigurasi rilis repositori ROS otomatis berdasarkan base OS
          export ROS_APT_SOURCE_VERSION=$(curl -s https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest | grep -F "tag_name" | awk -F'"' '{print $4}')
          curl -L -o /tmp/ros2-apt-source.deb "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.bookworm_all.deb"
          dpkg -i /tmp/ros2-apt-source.deb || apt install -f -y

      - name: Install Development Tools
        run: |
          apt update && apt install -y \
            python3-flake8-blind-except \
            python3-flake8-class-newline \
            python3-flake8-deprecated \
            python3-mypy \
            python3-pip \
            python3-pytest \
            python3-pytest-cov \
            python3-pytest-mock \
            python3-pytest-repeat \
            python3-pytest-rerunfailures \
            python3-pytest-runner \
            python3-pytest-timeout \
            ros-dev-tools

      - name: Download ROS 2 Source Code
        run: |
          mkdir -p ~/ros2_jazzy/src
          cd ~/ros2_jazzy
          # Menggunakan command vcs langsung ke link seperti di dokumentasi
          vcs import --input https://raw.githubusercontent.com/ros2/ros2/jazzy/ros2.repos src

      - name: Install Dependencies Using Rosdep
        run: |
          cd ~/ros2_jazzy
          rosdep init || true
          rosdep update

          # Trik: Buat rule kustom agar rosdep mengabaikan python3-sip-dev
          mkdir -p /etc/ros/rosdep/sources.list.d/
          echo "python3-sip-dev:" > /tmp/custom_rosdep.yaml
          echo "  ubuntu: []" >> /tmp/custom_rosdep.yaml
          echo "  debian: []" >> /tmp/custom_rosdep.yaml

          sudo cp /tmp/custom_rosdep.yaml /etc/ros/rosdep/custom.yaml
          echo "yaml file:///etc/ros/rosdep/custom.yaml" | sudo tee /etc/ros/rosdep/sources.list.d/99-custom.list > /dev/null

          # Update ulang rosdep agar membaca rule baru
          rosdep update

          # Jalankan instalasi dependensi
          rosdep install --from-paths src --ignore-src -y --os=ubuntu:noble \
            --skip-keys "fastcdr rti-connext-dds-6.0.1 urdfdom_headers"

      - name: Install Colcon Mixins & Build Code
        run: |
          cd ~/ros2_jazzy
          colcon mixin add default https://github.com/colcon/colcon-mixin-repository/raw/master/index.yaml || true
          colcon mixin update default
          # Build menggunakan flag optimal dari dokumentasi resmi
          colcon build --symlink-install --mixin release

      - name: Compress Build Output
        run: |
          cd ~/ros2_jazzy
          tar -czf ros2-jazzy-debian.tar.gz install/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros2-debian-binaries
          path: ~/ros2_jazzy/ros2-jazzy-debian.tar.gz
          retention-days: 7
